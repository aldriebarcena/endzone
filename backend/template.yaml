AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Fantasee backend — checker Lambda (every ~15 min, detects a live game)
  starts a Step Functions execution that polls that game every ~90s until
  it goes final. Step Functions is used for the poll loop instead of a
  second EventBridge rule because EventBridge's native rate()/cron()
  granularity is 60s minimum, not fine enough for the 90s target interval.

Parameters:
  RapidApiKey:
    Type: String
    NoEcho: true
    Description: RapidAPI key for the Tank01 NFL API (tank01-nfl-live-in-game-real-time-statistics-nfl)

Globals:
  Function:
    Runtime: python3.13
    Timeout: 30
    MemorySize: 128
    Environment:
      Variables:
        RAPIDAPI_KEY: !Ref RapidApiKey

Resources:
  LeagueConfigTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: fantasee-league-config
      PrimaryKey:
        Name: userId
        Type: String

  LiveGameStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: fantasee-live-game-state
      AttributeDefinitions:
        - AttributeName: gameId
          AttributeType: S
      KeySchema:
        - AttributeName: gameId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  PollerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: poller.app.handler
      Environment:
        Variables:
          LIVE_GAME_STATE_TABLE: !Ref LiveGameStateTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LiveGameStateTable

  PollerStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: fantasee-poller
      DefinitionUri: statemachine/poller.asl.json
      DefinitionSubstitutions:
        PollerFunctionArn: !GetAtt PollerFunction.Arn
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref PollerFunction

  CheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: checker.app.handler
      Environment:
        Variables:
          POLLER_STATE_MACHINE_ARN: !Ref PollerStateMachine
      Policies:
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt PollerStateMachine.Name
      Events:
        CheckSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Name: fantasee-checker-schedule
            Description: Checks every ~15 min whether a game is live
            Enabled: true

Outputs:
  LeagueConfigTableName:
    Value: !Ref LeagueConfigTable
  LiveGameStateTableName:
    Value: !Ref LiveGameStateTable
  PollerStateMachineArn:
    Value: !Ref PollerStateMachine
  CheckerFunctionName:
    Value: !Ref CheckerFunction
  PollerFunctionName:
    Value: !Ref PollerFunction
