name: Endzone
options:
  bundleIdPrefix: com.endzone
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

targets:
  Endzone:
    type: application
    platform: iOS
    sources:
      - path: Endzone
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Endzone
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
    entitlements:
      path: Generated/Endzone.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
    settings:
      base:
        # Placeholder — real bundle ID needs a registered Apple Developer
        # Team before Sign in with Apple / push entitlements actually work.
        PRODUCT_BUNDLE_IDENTIFIER: com.endzone.app
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic

  EndzoneTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EndzoneTests
    dependencies:
      - target: Endzone
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Endzone:
    build:
      targets:
        Endzone: all
        EndzoneTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EndzoneTests
